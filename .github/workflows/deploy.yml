name: Build & Deploy

on:
  push:
    branches: [master]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to DigitalOcean Container Registry
        run: echo "${{ secrets.DOCR_PASSWORD }}" | docker login registry.digitalocean.com -u "${{ secrets.DOCR_USERNAME }}" --password-stdin

      - name: Build & push frontend image
        run: |
          docker build -t registry.digitalocean.com/haiduks/fe -f frontend/Dockerfile .
          docker push registry.digitalocean.com/haiduks/fe

      - name: Build & push backend image
        run: |
          docker build -t registry.digitalocean.com/haiduks/be -f backend/Dockerfile .
          docker push registry.digitalocean.com/haiduks/be

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            docker pull registry.digitalocean.com/haiduks/fe
            docker pull registry.digitalocean.com/haiduks/be
            cd haiduti
            docker compose up -d
